<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - 缠论分析</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    /* === 登录页面样式 === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* 缠论红色主题 */
      --primary: #c8372e;
      --primary-hover: #e85a4f;
      --primary-light: rgba(200, 55, 46, 0.15);
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-card: rgba(26, 26, 26, 0.8);
      --text-primary: #e8e8e8;
      --text-secondary: #a0a0a0;
      --text-muted: #6b6b6b;
      --border: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.2);
      --error: #ef4444;
      --success: #22c55e;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* === 渐变背景 === */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg,
        rgba(99, 102, 241, 0.1) 0%,
        var(--bg-primary) 50%,
        rgba(99, 102, 241, 0.05) 100%);
      z-index: 0;
    }

    /* === 浮动圆圈动画 === */
    .floating-shapes {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      border-radius: 50%;
      background: var(--primary-light);
      filter: blur(60px);
      animation: float 20s ease-in-out infinite;
    }

    .shape:nth-child(1) {
      width: 60px;
      height: 60px;
      left: 10%;
      top: 10%;
      animation-delay: 0s;
      animation-duration: 20s;
    }

    .shape:nth-child(2) {
      width: 80px;
      height: 80px;
      left: 80%;
      top: 20%;
      animation-delay: 2s;
      animation-duration: 25s;
    }

    .shape:nth-child(3) {
      width: 40px;
      height: 40px;
      left: 70%;
      top: 70%;
      animation-delay: 4s;
      animation-duration: 18s;
    }

    .shape:nth-child(4) {
      width: 50px;
      height: 50px;
      left: 20%;
      top: 80%;
      animation-delay: 1s;
      animation-duration: 22s;
    }

    @keyframes float {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      25% {
        transform: translate(30px, -30px) scale(1.2);
      }
      50% {
        transform: translate(-30px, 30px) scale(0.8);
      }
      75% {
        transform: translate(-20px, -20px) scale(1.1);
      }
    }

    /* === 登录卡片 === */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* === Logo 图标 === */
    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-wrapper {
      position: relative;
      width: 72px;
      height: 72px;
      animation: logoAppear 0.6s ease-out 0.3s both;
    }

    @keyframes logoAppear {
      from {
        opacity: 0;
        transform: scale(0) rotate(-180deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    .logo-glow {
      position: absolute;
      inset: 0;
      background: var(--primary);
      border-radius: 8px;
      filter: blur(20px);
      opacity: 0.5;
      animation: logoRotate 20s linear infinite;
    }

    @keyframes logoRotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .logo-icon {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px -10px rgba(200, 55, 46, 0.5);
      font-family: 'Noto Serif SC', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
    }

    /* === 标题 === */
    .title {
      text-align: center;
      margin-bottom: 8px;
      animation: fadeInDown 0.6s ease-out 0.4s both;
    }

    .title h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .subtitle {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeInDown 0.6s ease-out 0.5s both;
    }

    .subtitle p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* === 表单 === */
    .form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-group {
      animation: slideInLeft 0.5s ease-out both;
    }

    .form-group:nth-child(1) { animation-delay: 0.6s; }
    .form-group:nth-child(2) { animation-delay: 0.7s; }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.3s ease;
    }

    .form-input {
      width: 100%;
      height: 48px;
      padding: 0 48px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--primary);
    }

    .form-input:focus + .input-icon,
    .input-wrapper:focus-within .input-icon {
      color: var(--primary);
    }

    /* 输入框下划线动画 - 带圆角，不超出输入框 */
    .input-underline {
      position: absolute;
      bottom: 0;
      left: 6px;
      right: 6px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
      transform: scaleX(0);
      transition: transform 0.3s ease;
      transform-origin: center; /* 从中间向两边展开 */
    }

    .form-input:focus ~ .input-underline {
      transform: scaleX(1);
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: var(--text-primary);
    }

    /* === 忘记密码 === */
    .forgot-password {
      display: flex;
      justify-content: flex-end;
      animation: fadeIn 0.5s ease-out 0.8s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .forgot-password button {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      transition: color 0.3s ease;
    }

    .forgot-password button:hover {
      text-decoration: underline;
    }

    /* === 提交按钮 === */
    .submit-group {
      animation: fadeInUp 0.5s ease-out 0.9s both;
    }

    .submit-btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -10px rgba(200, 55, 46, 0.5);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    /* 按钮加载动画 */
    .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 100%;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 按钮悬停效果 */
    .btn-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent,
        rgba(255, 255, 255, 0.1),
        transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .submit-btn:hover .btn-shine {
      transform: translateX(100%);
    }

    /* === 分隔线 === */
    .divider {
      position: relative;
      margin: 32px 0;
      animation: fadeIn 0.5s ease-out 1s both;
    }

    .divider::before {
      content: '';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
    }

    .divider::before::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      position: relative;
      padding: 0 12px;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-secondary);
    }

    /* === 注册提示 === */
    .signup-hint {
      text-align: center;
      animation: fadeIn 0.5s ease-out 1.1s both;
    }

    .signup-hint p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .signup-hint button {
      background: none;
      border: none;
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      padding: 0;
    }

    .signup-hint button:hover {
      text-decoration: underline;
    }

    /* === 底部装饰线 === */
    .card-accent {
      height: 4px;
      background: linear-gradient(90deg,
        var(--primary),
        rgba(200, 55, 46, 0.5),
        var(--primary));
      border-radius: 0 0 24px 24px;
      margin: -48px -40px 48px -40px;
      animation: scaleWidth 0.8s ease-out 1s both;
    }

    @keyframes scaleWidth {
      from {
        transform: scaleX(0);
      }
      to {
        transform: scaleX(1);
      }
    }

    /* 修复：确保装饰线宽度与卡片一致，不超出圆角 */
    .login-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: scaleIn 0.4s ease-out 0.2s both;
      overflow: hidden; /* 防止装饰线超出圆角 */
      position: relative;
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* === 底部文字 === */
    .footer-text {
      text-align: center;
      margin-top: 24px;
      animation: fadeIn 0.5s ease-out 1.2s both;
    }

    .footer-text p {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* === 错误提示 === */
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--error);
      display: none;
      animation: shake 0.5s ease;
    }

    .error-message.show {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    /* === 响应式 === */
    @media (max-width: 480px) {
      .login-container {
        padding: 16px;
      }

      .login-card {
        padding: 32px 24px;
      }

      .card-accent {
        margin: -32px -24px 32px -24px;
      }

      .title h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <!-- 底部装饰线 -->
      <div class="card-accent"></div>

      <!-- Logo -->
      <div class="logo-container">
        <div class="logo-wrapper">
          <div class="logo-glow"></div>
          <div class="logo-icon">纏</div>
        </div>
      </div>

      <!-- 标题 -->
      <div class="title">
        <h1>欢迎回来</h1>
      </div>
      <div class="subtitle">
        <p>登录您的账户继续</p>
      </div>

      <!-- 错误提示 -->
      <div class="error-message" id="errorMessage"></div>

      <!-- 表单 -->
      <form class="form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <div class="input-wrapper">
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="请输入用户名"
              required
              autocomplete="username"
            >
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <div class="input-underline"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            >
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
            <button type="button" class="password-toggle" id="passwordToggle">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
            <div class="input-underline"></div>
          </div>
        </div>

        <div class="forgot-password">
          <button type="button">忘记密码？</button>
        </div>

        <div class="submit-group">
          <button type="submit" class="submit-btn" id="submitBtn">
            <div class="btn-content">
              <span id="btnText">登录</span>
              <div class="spinner" id="spinner" style="display: none;"></div>
            </div>
            <div class="btn-shine"></div>
          </button>
        </div>
      </form>

      <!-- 分隔线 -->
      <div class="divider">
        <span>或者</span>
      </div>

      <!-- 注册提示 -->
      <div class="signup-hint">
        <p>需要账户？ <button type="button">联系管理员</button></p>
      </div>
    </div>

    <div class="footer-text">
      <p>登录即表示您同意我们的服务条款和隐私政策</p>
    </div>
  </div>

  <script src="/static/login.js"></script>
</body>
</html>
