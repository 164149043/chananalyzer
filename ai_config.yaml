# ================================
# 多AI协作分析配置
# ================================

# AI服务提供商配置
provider:
  name: deepseek
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com

# ================================
# 分析师配置
# ================================
analysts:
  # 分析师数量
  count: 2

  # 使用的模型
  model: deepseek-chat

  # 温度参数（不同分析师使用不同温度，获得多样化观点）
  temperatures: [0.4, 0.7]  # 分析师A偏保守，分析师B偏激进

  # 最大输出token数
  max_tokens: 2000

# ================================
# 决策者配置
# ================================
decision_maker:
  # 使用的模型（深度推理模型）
  model: deepseek-reasoner

  # 温度参数
  temperature: 0.3

  # 最大输出token数
  max_tokens: 2000

# ================================
# 提示词配置
# ================================
prompts:
  # 分析师系统提示词
  analyst_system: |
    你是一位专业的股票技术分析师，精通缠论理论。
    请根据缠论数据给出你的专业分析意见。

  # 决策者系统提示词
  decision_maker_system: |
    你是一位资深的投资决策专家，擅长综合多个分析师的意见做出最终决策。
    你会收到两位分析师的意见，需要综合评估后给出明确的操作建议。
    你看不到原始缠论数据，只能根据分析师的判断进行决策。

# ================================
# 输出配置
# ================================
output:
  # 是否显示分析师意见
  show_analyst_opinions: true

  # 是否显示分析耗时
  show_timing: true
